<style>
:root {
  --bg: #020617;
  --surface: #0f172a;
  --surface-hover: #1e293b;
  --primary: #f8fafc;
  --secondary: #94a3b8;
  --accent: #10b981;
  --danger: #f43f5e;
  --warning: #f59e0b;
  --border: #334155;
  --radius: 12px;
}

/* COMPORTAMENTO DE APP: BLOQUEIO DE SCROLL DO NAVEGADOR */
html, body {
  height: 100%;
  width: 100%;
  overflow: hidden; 
  background-color: var(--bg);
  position: fixed;
  overscroll-behavior: none; /* Impede pull-to-refresh */
}

* { 
  box-sizing: border-box; 
  margin: 0; 
  padding: 0; 
  -webkit-tap-highlight-color: transparent; 
  -webkit-touch-callout: none;
  user-select: none;
}

body {
  font-family: 'Inter', sans-serif;
  color: var(--primary);
  line-height: 1.5;
  display: flex;
  flex-direction: column;
}

.scroll-container {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding-bottom: env(safe-area-inset-bottom, 20px);
}

.app-container {
  max-width: 600px;
  margin: 0 auto;
  padding: 20px;
  padding-top: env(safe-area-inset-top, 20px);
}

header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 24px 0;
}

.brand-title {
  font-size: 1.1rem;
  font-weight: 800;
  letter-spacing: -0.5px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.summary-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
  margin-bottom: 24px;
}

.card {
  background: var(--surface);
  padding: 16px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
}

.card-full { 
  grid-column: 1 / -1; 
  background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
  border-left: 4px solid var(--border);
}

.card-label { 
  font-size: 0.65rem; 
  font-weight: 600; 
  color: var(--secondary); 
  text-transform: uppercase; 
  margin-bottom: 4px;
}

.card-value { 
  font-size: 1.25rem; 
  font-weight: 700; 
  font-family: 'JetBrains Mono', monospace;
}

.nav-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--surface);
  padding: 14px 20px;
  border-radius: var(--radius);
  margin-bottom: 20px;
  border: 1px solid var(--border);
}

.month-nav {
  display: flex;
  align-items: center;
  gap: 16px;
  font-weight: 700;
}

.month-nav button {
  background: var(--surface-hover);
  border: 1px solid var(--border);
  width: 32px;
  height: 32px;
  border-radius: 8px;
  cursor: pointer;
  color: var(--primary);
}

.tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 20px;
  background: var(--surface);
  padding: 4px;
  border-radius: 14px;
}

.tab-btn {
  flex: 1;
  background: transparent;
  border: none;
  padding: 10px;
  font-weight: 600;
  color: var(--secondary);
  border-radius: 10px;
  font-size: 0.8rem;
}

.tab-btn.active {
  background: var(--surface-hover);
  color: var(--primary);
}

.expense-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.expense-item {
  background: var(--surface);
  padding: 16px;
  border-radius: var(--radius);
  display: flex;
  align-items: center;
  justify-content: space-between;
  border: 1px solid var(--border);
}

.item-left { display: flex; align-items: center; gap: 14px; flex: 1; }
.item-icon { 
  width: 42px; height: 42px; border-radius: 10px; 
  display: flex; align-items: center; justify-content: center; 
  background: var(--surface-hover);
}

.item-details .name { font-weight: 600; font-size: 0.95rem; }
.item-details .meta { font-size: 0.7rem; color: var(--secondary); }

.item-price { font-family: 'JetBrains Mono', monospace; font-weight: 700; text-align: right; }

.btn-add {
  background: var(--primary);
  color: var(--bg);
  border: none;
  padding: 8px 16px;
  border-radius: 8px;
  font-weight: 700;
}

.btn-pay {
  background: transparent;
  border: 1px solid var(--border);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 0.65rem;
  font-weight: 700;
  color: var(--primary);
}
.btn-pay.paid { background: var(--primary); color: var(--bg); border: none; }

.btn-icon { background: transparent; border: none; color: var(--secondary); padding: 5px; }

/* Modal Estilo App */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(10px);
  display: none;
  align-items: flex-end;
  justify-content: center;
  z-index: 2000;
}
.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  width: 100%;
  max-width: 500px;
  border-radius: 28px 28px 0 0;
  padding: 30px;
  padding-bottom: calc(30px + env(safe-area-inset-bottom, 0px));
  animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1);
}

@keyframes slideUp {
  from { transform: translateY(100%); }
  to { transform: translateY(0); }
}

.input-group { margin-bottom: 20px; }
.input-group label { display: block; font-size: 0.65rem; font-weight: 700; color: var(--secondary); margin-bottom: 8px; }
.input-group input, .input-group select {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--primary);
  font-size: 1rem;
  outline: none;
}

.btn-primary { 
  background: var(--primary); color: var(--bg); border: none; padding: 18px; 
  border-radius: 16px; font-weight: 700; width: 100%;
}

.btn-ghost { background: transparent; color: var(--secondary); border: none; width: 100%; padding: 12px; font-weight: 600; margin-top: 10px;}

#toast {
  position: fixed;
  top: env(safe-area-inset-top, 24px);
  left: 50%;
  transform: translateX(-50%) translateY(-150px);
  background: var(--accent);
  color: #000;
  padding: 12px 24px;
  border-radius: 30px;
  transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  z-index: 3000;
  font-weight: 700;
  font-size: 0.85rem;
  box-shadow: 0 10px 20px rgba(0,0,0,0.5);
}
#toast.show { transform: translateX(-50%) translateY(20px); }

@media (min-width: 600px) {
  .modal { border-radius: 24px; margin-bottom: 40px; }
  .modal-overlay { align-items: center; }
}
</style>
</head>

<!-- Modais -->

<script>
const setupPWA = () => {
  // ÍCONE REPLICADO DO HEADER (Escudo Verde com $)
  const iconData = "data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iNTEyIiBoZWlnaHQ9IjUxMiIgdmlld0JveD0iMCAwIDEwMCAxMDAiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PHBhdGggZD0iTTUwIDE1TDIwIDI4djIyYzAgMTguNSAxMi44IDM1LjggMzAgNDAgMTcuMi00LjIgMzAtMjEuNSAzMC00MFYyOEw1MCAxNXoiIGZpbGw9IiMxMGI5ODEiLz48dGV4dCB5PSI2NSIgeD0iNTAiIGZvbnQtc2l6ZT0iMzUiIGZvbnQtZmFtaWx5PSJBcmlhbCIgZm9udC13ZWlnaHQ9ImJvbGQiIHRleHQtYW5jaG9yPSJtaWRkbGUiIGZpbGw9IndoaXRlIj4kPC90ZXh0Pjwvc3ZnPg==";
  
  const manifest = {
    "name": "Meu Controle Financeiro",
    "short_name": "Finanças",
    "start_url": ".",
    "display": "standalone",
    "background_color": "#020617",
    "theme_color": "#020617",
    "icons": [
      {
        "src": iconData,
        "sizes": "512x512",
        "type": "image/svg+xml",
        "purpose": "any maskable"
      }
    ]
  };
  
  const stringManifest = JSON.stringify(manifest);
  const blob = new Blob([stringManifest], {type: 'application/json'});
  const manifestURL = URL.createObjectURL(blob);
  document.querySelector('#pwa-manifest').setAttribute('href', manifestURL);

  if ('serviceWorker' in navigator) {
    const swCode = `
      self.addEventListener('install', e => e.waitUntil(self.skipWaiting()));
      self.addEventListener('activate', e => e.waitUntil(self.clients.claim()));
      self.addEventListener('fetch', e => e.respondWith(fetch(e.request).catch(() => {})));
    `;
    const swBlob = new Blob([swCode], {type: 'application/javascript'});
    const swURL = URL.createObjectURL(swBlob);
    navigator.serviceWorker.register(swURL).catch(() => {});
  }
};

const MONTHS = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
const CATEGORIES = {
  mercado: { icon: '🛒' }, estetica: { icon: '✨' }, moradia: { icon: '🏠' }, transporte: { icon: '🚗' },
  saude: { icon: '🏥' }, educacao: { icon: '📚' }, internet: { icon: '🌐' }, assinaturas: { icon: '💳' },
  lazer: { icon: '🎮' }, cartao: { icon: '💳' }, outros: { icon: '📦' }
};

let curDate = new Date();
let curMonth = curDate.getMonth();
let curYear = curDate.getFullYear();
let currentTab = 'fixos';
let state = { months: {}, fixosMaster: [], parcelamentos: [] };
let currentPayId = null;
let currentDeleteId = null;

const fmt = (v) => new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(v);
function getDbKey(m = curMonth, y = curYear) { return `${y}-${m}`; }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

function load() {
  const saved = localStorage.getItem('bjc_financas_v4_dark');
  if (saved) state = JSON.parse(saved);
  syncData();
}

function save() {
  localStorage.setItem('bjc_financas_v4_dark', JSON.stringify(state));
  render();
}

function syncData() {
  const key = getDbKey();
  if (!state.months[key]) state.months[key] = { fixos: [], variaveis: [] };
  
  state.fixosMaster.forEach(master => {
    const exists = state.months[key].fixos.find(f => f.masterId === master.id);
    if (!exists) {
      state.months[key].fixos.push({ ...master, id: Date.now() + Math.random(), masterId: master.id, paid_amount: 0 });
    }
  });
}

function getPreviousDebt() {
  let totalDebt = 0;
  const currentKey = getDbKey();
  Object.keys(state.months).forEach(key => {
    if (key < currentKey) {
      const mData = state.months[key];
      const all = [...mData.fixos, ...mData.variaveis];
      const total = all.reduce((s, i) => s + i.amount, 0);
      const paid = all.reduce((s, i) => s + (i.paid_amount || 0), 0);
      totalDebt += Math.max(0, total - paid);
    }
  });
  return totalDebt;
}

function render() {
  const key = getDbKey();
  const monthData = state.months[key];
  const prevDebt = getPreviousDebt();
  const parcelasTotalPendente = state.parcelamentos.reduce((s, i) => s + i.amount, 0);
  const allCurrent = [...monthData.fixos, ...monthData.variaveis];
  const totalMonthBruto = allCurrent.reduce((s, i) => s + i.amount, 0);
  const totalWithPrev = totalMonthBruto + prevDebt;
  const paidMonth = allCurrent.reduce((s, i) => s + (i.paid_amount || 0), 0);
  const pendingMonth = Math.max(0, totalWithPrev - paidMonth);
  const bruteTotal = pendingMonth + parcelasTotalPendente;

  document.getElementById('display-date').textContent = `${MONTHS[curMonth].toUpperCase()} ${curYear}`;
  document.getElementById('res-debt-bruta').textContent = fmt(bruteTotal);
  document.getElementById('res-pending-month').textContent = fmt(pendingMonth);
  document.getElementById('res-total').textContent = fmt(totalWithPrev);
  document.getElementById('res-paid').textContent = fmt(paidMonth);
  document.getElementById('res-pending-installments').textContent = fmt(parcelasTotalPendente);
  document.getElementById('prev-debt-indicator').style.display = prevDebt > 0 ? 'block' : 'none';

  let list = (currentTab === 'parcelas') ? state.parcelamentos : monthData[currentTab];
  const container = document.getElementById('expense-list');

  if (list.length === 0) {
    container.innerHTML = `<div style="text-align:center; padding:80px 20px; color:var(--secondary); font-size:0.85rem; opacity:0.4;">SEM REGISTROS NESTA CATEGORIA</div>`;
    return;
  }

  container.innerHTML = list.map(item => {
    const cat = CATEGORIES[item.cat] || CATEGORIES.outros;
    const pAmount = item.paid_amount || 0;
    const isPaid = (item.amount - pAmount) <= 0 && currentTab !== 'parcelas';
    return `
      <div class="expense-item">
        <div class="item-left" onclick="editItem(${item.id})">
          <div class="item-icon">${cat.icon}</div>
          <div class="item-details">
            <div class="name">${item.name}</div>
            <div class="meta">${item.due || 'D-?'} • ${item.cat.toUpperCase()}</div>
          </div>
        </div>
        <div class="item-right">
          <div class="item-price">${fmt(item.amount)}</div>
          <div style="display:flex; gap:8px; margin-top:6px; justify-content:flex-end;">
            <button class="btn-pay ${isPaid ? 'paid' : ''}" onclick="openPayModal(${item.id})">
              ${currentTab === 'parcelas' ? 'PAGAR' : (isPaid ? 'CONCLUÍDO' : 'PAGAR')}
            </button>
            <button class="btn-icon" onclick="openConfirmModal(${item.id})">🗑️</button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleModal(id, open) { document.getElementById(id).classList.toggle('open', open); }

function openAddModal() {
  document.getElementById('edit-id').value = '';
  document.getElementById('in-name').value = ''; 
  document.getElementById('in-amount').value = '';
  document.getElementById('in-due').value = '';
  document.getElementById('in-type').value = currentTab;
  toggleModal('modal-add', true);
}

function saveExpense() {
  const idStr = document.getElementById('edit-id').value;
  const name = document.getElementById('in-name').value;
  const amount = parseFloat(document.getElementById('in-amount').value);
  const cat = document.getElementById('in-cat').value;
  const due = document.getElementById('in-due').value;
  const type = document.getElementById('in-type').value;

  if (!name || isNaN(amount)) return;

  if (idStr) {
    const id = parseFloat(idStr);
    if (type === 'parcelas') {
      const idx = state.parcelamentos.findIndex(i => i.id === id);
      if (idx !== -1) state.parcelamentos[idx] = { ...state.parcelamentos[idx], name, amount, cat, due };
    } else {
      const key = getDbKey();
      const idx = state.months[key][type].findIndex(i => i.id === id);
      if (idx !== -1) {
        state.months[key][type][idx] = { ...state.months[key][type][idx], name, amount, cat, due };
        if (type === 'fixos') {
          const mIdx = state.fixosMaster.findIndex(f => f.id === state.months[key][type][idx].masterId);
          if (mIdx !== -1) state.fixosMaster[mIdx] = { ...state.fixosMaster[mIdx], name, amount, cat, due };
        }
      }
    }
  } else {
    const newItem = { id: Date.now(), name, amount, cat, due, paid_amount: 0 };
    if (type === 'fixos') {
      state.fixosMaster.push({ ...newItem });
      state.months[getDbKey()].fixos.push({ ...newItem, masterId: newItem.id });
    } else if (type === 'parcelas') state.parcelamentos.push(newItem);
    else state.months[getDbKey()].variaveis.push(newItem);
  }
  save(); 
  toggleModal('modal-add', false);
  showToast("Lançamento salvo!");
}

function editItem(id) {
  let item, type;
  const key = getDbKey();
  if (state.parcelamentos.find(i => i.id === id)) { item = state.parcelamentos.find(i => i.id === id); type = 'parcelas'; }
  else if (state.months[key].fixos.find(i => i.id === id)) { item = state.months[key].fixos.find(i => i.id === id); type = 'fixos'; }
  else { item = state.months[key].variaveis.find(i => i.id === id); type = 'variaveis'; }
  if (!item) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('in-name').value = item.name;
  document.getElementById('in-amount').value = item.amount;
  document.getElementById('in-cat').value = item.cat;
  document.getElementById('in-due').value = item.due || '';
  document.getElementById('in-type').value = type;
  toggleModal('modal-add', true);
}

function openPayModal(id) {
  let item;
  if (currentTab === 'parcelas') item = state.parcelamentos.find(i => i.id === id);
  else item = [...state.months[getDbKey()].fixos, ...state.months[getDbKey()].variaveis].find(i => i.id === id);
  if (!item) return;
  currentPayId = id;
  const rem = item.amount - (item.paid_amount || 0);
  document.getElementById('pay-details').innerHTML = `<strong style="color:white;font-size:1.1rem">${item.name}</strong><br>VALOR EM ABERTO: ${fmt(rem)}`;
  document.getElementById('pay-value').value = rem.toFixed(2);
  toggleModal('modal-pay', true);
}

function confirmPayment() {
  const val = parseFloat(document.getElementById('pay-value').value);
  if (isNaN(val) || val <= 0) return;
  if (currentTab === 'parcelas') {
    const item = state.parcelamentos.find(i => i.id === currentPayId);
    if (item) { item.amount -= val; if (item.amount <= 0) state.parcelamentos = state.parcelamentos.filter(i => i.id !== currentPayId); }
  } else {
    const item = [...state.months[getDbKey()].fixos, ...state.months[getDbKey()].variaveis].find(i => i.id === currentPayId);
    if (item) item.paid_amount = (item.paid_amount || 0) + val;
  }
  save(); 
  toggleModal('modal-pay', false);
  showToast("Pagamento registrado!");
}

function openConfirmModal(id) { currentDeleteId = id; toggleModal('modal-confirm', true); }

document.getElementById('btn-confirm-delete').onclick = () => {
  if (currentDeleteId) {
    const id = currentDeleteId; const key = getDbKey();
    state.parcelamentos = state.parcelamentos.filter(i => i.id !== id);
    const fx = state.months[key].fixos.find(i => i.id === id);
    if (fx) state.fixosMaster = state.fixosMaster.filter(f => f.id !== fx.masterId);
    state.months[key].fixos = state.months[key].fixos.filter(i => i.id !== id);
    state.months[key].variaveis = state.months[key].variaveis.filter(i => i.id !== id);
    save(); 
    toggleModal('modal-confirm', false);
    showToast("Item excluído.");
  }
};

function switchTab(t) { currentTab = t; document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.id === `tab-${t}`)); render(); }
function changeMonth(s) { curMonth += s; if (curMonth > 11) { curMonth = 0; curYear++; } else if (curMonth < 0) { curMonth = 11; curYear--; } syncData(); render(); }

window.onload = () => { 
  setupPWA();
  load(); 
  render(); 
};
</script>
</body>
</html>
